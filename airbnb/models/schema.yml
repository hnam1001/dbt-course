version: 2

models:
    - name: dim_listings_cleansed
      tests:
        - minimum_row_count:
            arguments:
              min_row_count: 1000
              config:
                severity: warn
      columns:
        - name: listing_id
          tests:
            - unique
            - not_null

        - name: host_id
          tests:
            - not_null
            - relationships:
                arguments:
                    to: ref('dim_hosts_cleansed')
                    field: host_id

        - name: minimum_nights
          tests:
            - positive_values

        - name: room_type
          tests:
            - accepted_values:
                arguments:
                    values: ['Entire home/apt', 'Private room' , 'Shared room', 'Hotel room']

    - name: dim_hosts_cleansed
      config:
        contract:
          enforced: true
      columns:
        - name: host_id
          data_type: integer
          constraints:
            - type: not_null
          tests:
            - unique
        - name: host_name
          data_type: varchar
          tests:
            - not_null
        - name: is_superhost
          data_type: varchar
          tests:
            - accepted_values:
                arguments:
                  values: ['t', 'f']
        - name: updated_at
          data_type: timestamp
        - name: created_at
          data_type: timestamp



