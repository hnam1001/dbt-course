version: 2

models:
    - name: dim_listings_cleansed
      description: Cleansed table contains airbnb listings
      tests:
        - minimum_row_count:
            arguments:
              min_row_count: 1000
              config:
                severity: warn
      columns:
        - name: listing_id
          description: Primary key for the listing
          tests:
            - unique
            - not_null

        - name: host_id
          description: The host's id. References the host table.
          tests:
            - not_null
            - relationships:
                arguments:
                    to: ref('dim_hosts_cleansed')
                    field: host_id

        - name: minimum_nights
          description: "{{ doc('dim_listings_cleansed_minimum_night') }}"
          tests:
            - positive_values

        - name: room_type
          description: Type of the apartment/room
          tests:
            - accepted_values:
                arguments:
                    values: ['Entire home/apt', 'Private room' , 'Shared room', 'Hotel room']

    - name: dim_hosts_cleansed
      description: This table contains data on the host
      config:
        contract:
          enforced: true
      columns:
        - name: host_id
          description: The id of the host
          data_type: integer
          constraints:
            - type: not_null
          tests:
            - unique
        - name: host_name
          data_type: varchar
          tests:
            - not_null
        - name: is_superhost
          data_type: varchar
          tests:
            - accepted_values:
                arguments:
                  values: ['t', 'f']
        - name: updated_at
          data_type: timestamp
        - name: created_at
          data_type: timestamp

    - name: dim_listings_with_hosts
      tests:
            - dbt_expectations.expect_table_row_count_to_equal_other_table:
                arguments:
                  compare_model: source('airbnb','listings')
      columns:
        - name: price
          tests:
            - dbt_expectations.expect_column_quantile_values_to_be_between:
                arguments:
                  quantile: .99
                  min_value: 50
                  max_value: 500
            - dbt_expectations.expect_column_max_to_be_between:
                arguments:
                  min_value: 0
                  max_value: 5000
                  config:
                    severity: warn
            - dbt_expectations.expect_column_values_to_be_of_type:
                arguments:
                   column_type: number











